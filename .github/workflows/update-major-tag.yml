# Based on https://github.com/actions/checkout/blob/main/.github/workflows/update-main-version.yml
name: Update major tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: The new version tag (e.g. v2.1.0)
        required: true
      major_tag:
        description: The major tag to update (e.g. v2)
        required: true

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.TAG_ADMIN_TOKEN }}

      - name: Validate major tag format
        run: |
          if [[ ! "$MAJOR_TAG" =~ ^v[0-9]+$ ]]; then
            echo "::error::major_tag must match 'vN' (e.g. v1, v2, v3)"
            exit 1
          fi
        env:
          MAJOR_TAG: ${{ github.event.inputs.major_tag }}

      - name: Validate target tag exists
        run: |
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG does not exist"
            exit 1
          fi
        env:
          TAG: ${{ github.event.inputs.tag }}

      - name: Validate tag is reachable from main
        run: |
          TAG_COMMIT=$(git rev-parse "$TAG^{commit}")
          if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "::error::Tag $TAG points to commit $TAG_COMMIT which is not reachable from the main branch. Tags must only reference commits on main."
            exit 1
          fi
        env:
          TAG: ${{ github.event.inputs.tag }}

      - name: Update tag
        run: git tag -f "$MAJOR_TAG" "$TAG"
        env:
          TAG: ${{ github.event.inputs.tag }}
          MAJOR_TAG: ${{ github.event.inputs.major_tag }}

      - name: Push tag
        run: git push origin "$MAJOR_TAG" --force
        env:
          MAJOR_TAG: ${{ github.event.inputs.major_tag }}
